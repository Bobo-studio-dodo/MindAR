<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原生相機硬體測試</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: sans-serif; text-align: center; }
        #video { width: 100vw; height: 80vh; background: #000; object-fit: cover; }
        #btn { margin-top: 20px; padding: 15px 40px; font-size: 18px; border-radius: 25px; border: none; background: #007AFF; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h2>📷 網頁原生相機測試</h2>
    <video id="video" autoplay playsinline></video>
    <br>
    <button id="btn">點擊測試：喚醒鏡頭</button>

    <script>
        const video = document.getElementById('video');
        const btn = document.getElementById('btn');

        btn.addEventListener('click', async () => {
            btn.style.display = 'none';
            try {
                // 🚀 直接用網頁底層技術去呼叫後置鏡頭，不載入任何 AR 套件
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" } } // 強制開後鏡頭
                });
                video.srcObject = stream;
            } catch (err) {
                console.log("後鏡頭失敗，嘗試切換任意鏡頭...", err);
                try {
                    // 如果是電腦測試沒有後鏡頭，就開預設鏡頭
                    const looseStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = looseStream;
                } catch (finalErr) {
                    alert("鏡頭徹底啟動失敗: " + finalErr.message);
                    btn.style.display = 'inline-block';
                }
            }
        });
    </script>

</body>
</html>
