<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自然圖像辨識跳轉系統</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        
        /* 手動按鈕：保障相機 100% 順暢喚醒 */
        #start-btn {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 40px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(0,122,255,0.4);
        }

        #scan-hint {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 16px;
            z-index: 9999;
            pointer-events: none;
            display: none;
            text-align: center;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <button id="start-btn">開啟相機並開始掃描</button>
    <div id="scan-hint">📷 請將手機鏡頭對準「乾淨的原始卡片」</div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        
        <a-nft type="nft" url="./mycard" id="card-trigger" smooth="true" smoothCount="10" smoothTolerance=".01" smoothThreshold="5">
            </a-nft>

        <a-entity camera></a-entity>

    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const startBtn = document.querySelector('#start-btn');
            const scanHint = document.querySelector('#scan-hint');
            const sceneEl = document.querySelector('a-scene');
            const nftMarker = document.querySelector('#card-trigger');

            sceneEl.pause();

            startBtn.addEventListener('click', () => {
                startBtn.style.display = 'none';
                scanHint.style.display = 'block';
                sceneEl.play();
                console.log("NFT 影像辨識相機已安全啟動");
            });

            // 🌟 當鏡頭「看見」你原本乾淨卡片上的插畫特徵點時
            nftMarker.addEventListener('markerFound', () => {
                console.log("🎉 偵測到原始插畫！直接執行網頁跳轉！");
                window.location.href = "https://bobo-studio-dodo.github.io/Bobo_studio.dodo_web/";
            });
        });
    </script>

</body>
</html>
