<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡片視覺辨識互動系統</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        
        /* 相機畫面滿版設定 */
        #container { width: 100vw; height: 100vh; position: relative; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        /* 啟動相機的藍色按鈕 */
        #start-btn {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 40px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(0,122,255,0.4);
        }

        /* 彈出圖片視窗 UI */
        #popup-modal {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #popup-modal img {
            max-width: 85%;
            max-height: 70%;
            border-radius: 12px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.7);
        }
        #close-btn {
            margin-top: 20px;
            padding: 12px 35px;
            background: #fff;
            color: #333;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="start-btn">開啟相機並開始掃描</button>

    <div id="container"></div>

    <div id="popup-modal">
        <img id="popup-img" src="https://picsum.photos/600/800" alt="Result">
        <button id="close-btn">關閉並繼續掃描</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.querySelector('#container');
            const popupModal = document.querySelector('#popup-modal');
            const closeBtn = document.querySelector('#close-btn');
            const startBtn = document.querySelector('#start-btn');

            let mindarImage = null;

            // 監聽按鈕點擊事件
            startBtn.addEventListener("click", async () => {
                startBtn.style.display = 'none';

                try {
                    // 2. 在 1.1.4 版本中，建構式名稱叫 MindARImageController
                    mindarImage = new window.MindARImageController({
                        container: container,
                    });

                    // 3. 載入卡片辨識檔
                    await mindarImage.addImageTargets('./card-targets.mind');
                    
                    // 4. 開啟鏡頭並啟動辨識引擎
                    await mindarImage.start();
                    console.log("系統成功啟動，正在即時辨識卡片...");

                    // 5. 每幀即時監聽鏡頭畫面
                    mindarImage.onUpdate = (data) => {
                        if (data.type === 'update') {
                            const {targetIndex, isScanning, trackingMatrix} = data.detail;
                            
                            // 當偵測到第一張卡片（targetIndex === 0）
                            if (targetIndex === 0 && !isScanning && trackingMatrix) {
                                console.log("🎉 成功找出圖片！");
                                popupModal.style.display = "flex";
                            }
                        }
                    };

                } catch (err) {
                    console.error("啟動失敗:", err);
                    alert("無法啟動相機，請確認是否允許相機權限！");
                    startBtn.style.display = 'block';
                }
            });

            // 關閉彈出視窗，讓使用者能繼續掃描
            closeBtn.addEventListener("click", () => {
                popupModal.style.display = "none";
            });
        });
    </script>

</body>
</html>
