<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡片視覺辨識跳轉系統</title>

    <script src="https://docs.opencv.org/4.5.4/opencv.js"></script>

    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; color: white; }
        #video-container { width: 100vw; height: 100vh; position: relative; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; z-index: 1; }
        canvas { display: none; } 

        /* 剛進入網頁的啟動按鈕 */
        #start-btn {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 18px 45px; background: #007AFF; color: white;
            border: none; border-radius: 30px; font-size: 19px; font-weight: bold;
            cursor: pointer; z-index: 10001; box-shadow: 0 4px 20px rgba(0,122,255,0.5);
        }

        /* 頂部掃描提示 */
        #scan-hint {
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 12px 30px;
            border-radius: 25px; font-size: 16px; z-index: 10000; pointer-events: none; display: none;
            white-space: nowrap; letter-spacing: 1px;
        }

        /* 滿版半透明黑色遮罩 */
        #scan-mask {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.2); z-index: 2; display: none;
            justify-content: center; align-items: center;
        }

        /* 中央掃描框提示 (精準對齊卡片的 3:4 比例) */
        #scan-region {
            position: relative;
            width: 70vw; height: 93.3vw;
            max-width: 320px; max-height: 426.6px;
            border: 3px solid #00ff00; /* 綠色對齊框 */
            border-radius: 16px;
            background: transparent;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.3); 
            overflow: hidden;
        }

        /* 掃描框的四個角美化 */
        #scan-region::before, #scan-region::after {
            content: ''; position: absolute; width: 25px; height: 25px; border-color: #00ff00; border-style: solid; pointer-events: none;
        }
        #scan-region::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-top-left-radius: 13px; }
        #scan-region::after { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-bottom-right-radius: 13px; }
    </style>
</head>
<body>

    <button id="start-btn">開啟相機並開始掃描</button>
    <div id="scan-hint">📷 請將卡片對齊下方中央框框</div>
    
    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        
        <div id="scan-mask">
            <div id="scan-region"></div>
        </div>

        <canvas id="canvas-match"></canvas>
    </div>

    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('start-btn');
        const scanHint = document.getElementById('scan-hint');
        const scanMask = document.getElementById('scan-mask');
        const canvas = document.getElementById('canvas-match');
        const ctx = canvas.getContext('2d');

        let templateImg = new Image();
        let isMatched = false;

        templateImg.src = './card.png'; 

        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            scanHint.style.display = 'block';
            scanMask.style.display = 'flex'; 

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" }, width: 640, height: 480 }
                });
                video.srcObject = stream;
                
                video.addEventListener('canplay', () => { setTimeout(processVideo, 1500); });
                setTimeout(processVideo, 1500);
            } catch (err) {
                const looseStream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = looseStream;
                setTimeout(processVideo, 1500);
            }
        });

        function processVideo() {
            if (isMatched) return;

            try {
                if (video.readyState === video.HAVE_ENOUGH_DATA && typeof cv !== 'undefined' && cv.Mat) {
                    canvas.width = 640; 
                    canvas.height = 480;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    // 1. 讀取完整相機畫面
                    let fullSrc = cv.imread('canvas-match');
                    
                    // 2. 🟢 核心修正：精準計算綠色框框在 640x480 畫面中的實體像素座標
                    // 寬度佔 70% (約 448 像素)，高度對齊 3:4 (約 336 像素)
                    let rect = new cv.Rect(96, 72, 448, 336); 
                    
                    // 3. 🟢 只裁切出框框內的畫面進行比對
                    let src = fullSrc.roi(rect);
                    
                    let templ = cv.imread(templateImg);
                    
                    // 4. 將範本圖片（card.png）自動縮放到與裁切框大小一致，確保 1:1 像素對齊
                    let resizedTempl = new cv.Mat();
                    let dsize = new cv.Size(448, 336);
                    cv.resize(templ, resizedTempl, dsize, 0, 0, cv.INTER_AREA);

                    let dst = new cv.Mat();
                    let mask = new cv.Mat();

                    // 5. 執行核心匹配
                    cv.matchTemplate(src, resizedTempl, dst, cv.TM_CCOEFF_NORMED, mask);
                    let result = cv.minMaxLoc(dst, mask);
                    
                    console.log("當前裁切區吻合度：", result.maxVal);

                    // 🎯 6. 安全防線：因為排除背景干擾，這裡將跳轉門檻鎖定在安全的 0.60
                    if (result.maxVal > 0.60) {
                        isMatched = true;
                        
                        // 記憶體釋放
                        fullSrc.delete(); src.delete(); templ.delete(); 
                        resizedTempl.delete(); dst.delete(); mask.delete();
                        
                        // 🚀 執行直接跳轉
                        window.location.href = "https://bobo-studio-dodo.github.io/Bobo_studio.dodo_web/";
                        return;
                    }

                    fullSrc.delete(); src.delete(); templ.delete(); 
                    resizedTempl.delete(); dst.delete(); mask.delete();
                }
            } catch (e) {
                // 運算中
            }

            if (!isMatched) {
                requestAnimationFrame(processVideo);
            }
        }
    </script>

</body>
</html>
