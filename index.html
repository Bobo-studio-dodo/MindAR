<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡片視覺辨識互動系統</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image/main.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        
        /* 相機畫面滿版設定 */
        #container { width: 100vw; height: 100vh; position: relative; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        /* 辨識成功時彈出的圖片視窗 UI */
        #popup-modal {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #popup-modal img {
            max-width: 85%;
            max-height: 70%;
            border-radius: 12px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.7);
        }
        #close-btn {
            margin-top: 20px;
            padding: 12px 35px;
            background: #fff;
            color: #333;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="container"></div>

    <div id="popup-modal">
        <img id="popup-img" src="https://picsum.photos/600/800" alt="Result">
        <button id="close-btn">關閉並繼續掃描</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const container = document.querySelector('#container');
            const popupModal = document.querySelector('#popup-modal');
            const closeBtn = document.querySelector('#close-btn');

            // 1. 初始化純影像辨識控制器，直接載入你的卡片辨識檔
            const mindarThree = new window.MINDAR.IMAGE.Controller({
                container: container,
                imageTargetSrc: './card-targets.mind'
            });

            try {
                // 2. 啟動辨識引擎（這一步會自動跟瀏覽器請求相機權限）
                await mindarThree.start();
                console.log("影像辨識系統啟動成功，請對準卡片！");

                // 3. 每秒即時解析鏡頭畫面
                // targetIndex: 0 代表你辨識檔裡面的第一張卡片
                mindarThree.onUpdate = (data) => {
                    if (data.type === 'update') {
                        const {targetIndex, isScanning, trackingMatrix} = data.detail;
                        
                        // 🟢 當偵測到第一張卡片出現在畫面中時
                        if (targetIndex === 0 && !isScanning && trackingMatrix) {
                            console.log("辨識成功！");
                            
                            // 方案一：如果你想要直接「跳轉網頁」，把下面這行的註解拿掉：
                            // window.location.href = "https://www.google.com";

                            // 方案二：如果你希望直接在網頁內「跳出設定好的圖片」：
                            popupModal.style.display = "flex";
                        }
                    }
                };

            } catch (err) {
                console.error("相機或辨識檔載入失敗:", err);
            }

            // 點擊關閉按鈕，隱藏圖片視窗
            closeBtn.addEventListener("click", () => {
                popupModal.style.display = "none";
            });
        });
    </script>

</body>
</html>
