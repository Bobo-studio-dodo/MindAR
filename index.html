<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡片視覺辨識互動系統</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r123/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image/mindar-image.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image/main.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        
        /* 相機容器 */
        #container { width: 100vw; height: 100vh; position: relative; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        /* 🟢 引導點擊的藍色按鈕（用來破解手機相機封鎖機制） */
        #start-btn {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 40px;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000; /* 確保在最上層 */
            box-shadow: 0 4px 15px rgba(0,122,255,0.4);
        }

        /* 彈出圖片視窗 UI */
        #popup-modal {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #popup-modal img {
            max-width: 85%;
            max-height: 70%;
            border-radius: 12px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.7);
        }
        #close-btn {
            margin-top: 20px;
            padding: 12px 35px;
            background: #fff;
            color: #333;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="start-btn">開啟相機並開始掃描</button>

    <div id="container"></div>

    <div id="popup-modal">
        <img id="popup-img" src="https://picsum.photos/600/800" alt="Result">
        <button id="close-btn">關閉並繼續掃描</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.querySelector('#container');
            const popupModal = document.querySelector('#popup-modal');
            const closeBtn = document.querySelector('#close-btn');
            const startBtn = document.querySelector('#start-btn');

            // 1. 先初始化，但不急著啟動
            const mindarThree = new window.MINDAR.IMAGE.Controller({
                container: container,
                imageTargetSrc: './card-targets.mind'
            });

            // 2. 監聽按鈕點擊事件（透過點擊事件向手機合法申請相機）
            startBtn.addEventListener("click", async () => {
                // 隱藏按鈕，避免阻擋畫面
                startBtn.style.display = 'none';

                try {
                    // 在點擊事件內啟動相機
                    await mindarThree.start();
                    console.log("影像辨識系統啟動成功！");

                    // 3. 監聽辨識結果
                    mindarThree.onUpdate = (data) => {
                        if (data.type === 'update') {
                            const {targetIndex, isScanning, trackingMatrix} = data.detail;
                            // 辨識到第一張卡片
                            if (targetIndex === 0 && !isScanning && trackingMatrix) {
                                popupModal.style.display = "flex";
                            }
                        }
                    };

                } catch (err) {
                    console.error("相機或辨識檔載入失敗:", err);
                    alert("無法啟動相機，請檢查瀏覽器設定或權限！");
                    startBtn.style.display = 'block'; // 失敗了就把按鈕顯示回來
                }
            });

            // 關閉彈出視窗
            closeBtn.addEventListener("click", () => {
                popupModal.style.display = "none";
            });
        });
    </script>

</body>
</html>
