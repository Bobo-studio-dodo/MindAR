<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡片視覺辨識互動系統</title>

    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #container { width: 100vw; height: 100vh; position: relative; }

        /* 彈出圖片視窗 UI */
        #popup-modal {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #popup-modal img {
            max-width: 85%;
            max-height: 70%;
            border-radius: 12px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.7);
        }
        #close-btn {
            margin-top: 20px;
            padding: 12px 35px;
            background: #fff;
            color: #333;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="container"></div>

    <div id="popup-modal">
        <img id="popup-img" src="https://picsum.photos/600/800" alt="Result">
        <button id="close-btn">關閉並繼續掃描</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const container = document.querySelector('#container');
            const popupModal = document.querySelector('#popup-modal');
            const closeBtn = document.querySelector('#close-btn');

            let mindarImage = null;

            try {
                // 🚀 嚴謹確認新版全域變數是否存在
                if (typeof window.MINDAR === 'undefined' || !window.MINDAR.IMAGE) {
                    throw new Error("大腦套件尚未下載完畢");
                }

                // 🚀 採用 1.2.5 全域最新規格初始化
                mindarImage = new window.MINDAR.IMAGE.MindARImageController({
                    container: container
                });

                // 載入你在 Scale 1 下載的新辨識檔
                await mindarImage.addImageTargets('./card-targets.mind');
                
                // 直接開啟鏡頭（因為剛才測試過原生相機沒問題，這裡可以直接安全啟動）
                await mindarImage.start();
                console.log("最新版影像辨識系統啟動成功！");

                // 監聽辨識事件
                mindarImage.onUpdate = (data) => {
                    if (data.type === 'update') {
                        const {targetIndex, isScanning, trackingMatrix} = data.detail;
                        if (targetIndex === 0 && !isScanning && trackingMatrix) {
                            console.log("🎉 成功找出圖片！");
                            popupModal.style.display = "flex";
                        }
                    }
                };

            } catch (err) {
                console.error("啟動失敗:", err);
                alert("錯誤回報: " + err.message);
            }

            closeBtn.addEventListener("click", () => {
                popupModal.style.display = "none";
            });
        });
    </script>

</body>
</html>
