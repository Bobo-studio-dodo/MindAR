<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡片掃描跳轉系統 (AR.js完美版)</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        
        /* 手動按鈕：保障手機相機 100% 順暢喚醒 */
        #start-btn {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 40px;
            background: #FF5722;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(255,87,34,0.4);
        }

        #scan-hint {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 16px;
            z-index: 9999;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>

    <button id="start-btn">開啟相機並開始掃描</button>
    <div id="scan-hint">📷 請將手機鏡頭對準實體卡片</div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" vr-mode-ui="enabled: false">
        
        <a-marker type="pattern" url="./pattern-marker.patt" id="card-trigger">
            </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const startBtn = document.querySelector('#start-btn');
            const scanHint = document.querySelector('#scan-hint');
            const sceneEl = document.querySelector('a-scene');
            const marker = document.querySelector('#card-trigger');

            // 1. 預設先讓 AR 引擎暫停，等手動喚醒
            sceneEl.pause();

            startBtn.addEventListener('click', () => {
                startBtn.style.display = 'none';
                scanHint.style.display = 'block';
                
                // 🚀 安全喚醒相機
                sceneEl.play();
                console.log("AR.js 相機已成功強制重啟");
            });

            // 2. 🌟 核心功能：只要鏡頭捕捉到你的自訂卡片
            marker.addEventListener('markerFound', () => {
                console.log("🎉 成功捕捉到卡片！準備執行網頁跳轉！");
                
                // 🚀 跳轉到你的目的地網頁
                window.location.href = "https://bobo-studio-dodo.github.io/Bobo_studio.dodo_web/";
            });
        });
    </script>

</body>
</html>
