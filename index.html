<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>終極除錯偵測系統</title>
    <script src="https://docs.opencv.org/4.5.4/opencv.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: monospace; overflow: hidden; color: #00ff00; }
        #video-container { width: 100vw; height: 100vh; position: relative; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; z-index: 1; }
        canvas { display: none; }

        /* 🟢 除錯專用數據看板 */
        #debug-panel {
            position: fixed; top: 10px; left: 10px; 
            background: rgba(0,0,0,0.85); padding: 15px; 
            border-radius: 8px; border: 1px solid #00ff00;
            font-size: 14px; z-index: 10002; pointer-events: none;
            line-height: 1.5; width: calc(100vw - 50px); max-width: 350px;
        }

        #start-btn {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 18px 45px; background: #007AFF; color: white;
            border: none; border-radius: 30px; font-size: 19px; font-weight: bold;
            cursor: pointer; z-index: 10001; box-shadow: 0 4px 20px rgba(0,122,255,0.5);
        }

        #scan-mask {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.2); z-index: 2; display: none;
            justify-content: center; align-items: center;
        }
        #scan-region {
            position: relative; width: 70vw; height: 93.3vw;
            max-width: 320px; max-height: 426.6px;
            border: 3px solid #00ff00; border-radius: 16px;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <div id="debug-panel">
        <div>[系統狀態] <span id="status" style="color:white">等待啟動...</span></div>
        <div>[OpenCV 引擎] <span id="cv-status" style="color:red">尚未就緒</span></div>
        <div>[卡片基準圖] <span id="img-status" style="color:red">尚未載入</span></div>
        <hr style="border-color:#00ff00">
        <div style="font-size: 16px; font-weight:bold;">實時吻合度：<span id="score" style="color:#ffcc00">0.00</span></div>
        <div>跳轉門檻值：<span style="color:white">0.50</span></div>
    </div>

    <button id="start-btn">開啟相機並開始掃描</button>
    
    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div id="scan-mask">
            <div id="scan-region"></div>
        </div>
        <canvas id="canvas-match"></canvas>
    </div>

    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('start-btn');
        const scanMask = document.getElementById('scan-mask');
        const canvas = document.getElementById('canvas-match');
        const ctx = canvas.getContext('2d');

        // 數據看板元件
        const txtStatus = document.getElementById('status');
        const txtCv = document.getElementById('cv-status');
        const txtImg = document.getElementById('img-status');
        const txtScore = document.getElementById('score');

        let templateImg = new Image();
        let isMatched = false;

        // 定時檢查 OpenCV 是否加載成功
        let cvCheckInterval = setInterval(() => {
            if (typeof cv !== 'undefined' && cv.Mat) {
                txtCv.innerText = "✅ 已成功載入";
                txtCv.style.color = "#00ff00";
                clearInterval(cvCheckInterval);
            }
        }, 500);

        // 監聽卡片圖片載入狀態
        templateImg.src = './card.png'; 
        templateImg.onload = () => {
            txtImg.innerText = "✅ 載入成功 (card.png)";
            txtImg.style.color = "#00ff00";
        };
        templateImg.onerror = () => {
            txtImg.innerText = "❌ 找不到實體檔案！";
            txtImg.style.color = "red";
        };

        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            scanMask.style.display = 'flex';
            txtStatus.innerText = "相機啟動中...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" }, width: 640, height: 480 }
                });
                video.srcObject = stream;
                txtStatus.innerText = "🔍 正在實時比對中...";
                
                video.addEventListener('canplay', () => { setTimeout(processVideo, 1000); });
                setTimeout(processVideo, 1000);
            } catch (err) {
                txtStatus.innerText = "相機出錯，嘗試相容模式...";
                const looseStream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = looseStream;
                setTimeout(processVideo, 1000);
            }
        });

        function processVideo() {
            if (isMatched) return;

            try {
                if (video.readyState === video.HAVE_ENOUGH_DATA && typeof cv !== 'undefined' && cv.Mat) {
                    canvas.width = 640; 
                    canvas.height = 480;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    let src = cv.imread('canvas-match');
                    let templ = cv.imread(templateImg);
                    let dst = new cv.Mat();
                    let mask = new cv.Mat();

                    cv.matchTemplate(src, templ, dst, cv.TM_CCOEFF_NORMED, mask);
                    let result = cv.minMaxLoc(dst, mask);
                    
                    // 🟢 將運算數值直接噴在螢幕上！
                    let currentScore = result.maxVal.toFixed(2);
                    txtScore.innerText = currentScore;

                    // 🎯 暫時將門檻鎖定在 0.50
                    if (result.maxVal > 0.50) {
                        isMatched = true;
                        txtStatus.innerText = "🎉 比對成功！跳轉中...";
                        src.delete(); templ.delete(); dst.delete(); mask.delete();
                        window.location.href = "https://bobo-studio-dodo.github.io/Bobo_studio.dodo_web/";
                        return;
                    }

                    src.delete(); templ.delete(); dst.delete(); mask.delete();
                }
            } catch (e) {
                // 運算中出錯，在看板顯示錯誤
                txtStatus.innerText = "運算發生異常: " + e.message;
            }

            if (!isMatched) {
                requestAnimationFrame(processVideo);
            }
        }
    </script>

</body>
</html>
