<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡片視覺辨識跳轉系統</title>

    <script src="https://docs.opencv.org/4.5.4/opencv.js"></script>

    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; color: white; }
        #video-container { width: 100vw; height: 100vh; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; z-index: 1; }
        canvas { display: none; } 

        /* 啟動按鈕 */
        #start-btn {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 18px 45px; background: #007AFF; color: white;
            border: none; border-radius: 30px; font-size: 19px; font-weight: bold;
            cursor: pointer; z-index: 10001; box-shadow: 0 4px 20px rgba(0,122,255,0.5);
        }

        /* 頂部提示 */
        #scan-hint {
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 12px 30px;
            border-radius: 25px; font-size: 16px; z-index: 10000; pointer-events: none; display: none;
            white-space: nowrap; letter-spacing: 1px;
        }

        /* 🌟 終極修正：把框框整體放大 (從 65vw 放大到 85vw) */
        /* 這樣能物理上逼迫使用者把手機靠得非常近，讓卡片在相機畫面裡呈現「滿版」狀態，精準對齊大圖！ */
        #perfect-scan-frame {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85vw; height: 113.3vw; /* 保持 3:4 比例 */
            max-width: 450px; max-height: 600px; /* 提高最大上限 */
            border: 4px solid #00ff00; 
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.6); 
            z-index: 9999;
            pointer-events: none; 
            display: none;
        }
    </style>
</head>
<body>

    <button id="start-btn">開啟相機並開始掃描</button>
    <div id="scan-hint">📷 請將卡片靠近並填滿綠色框框</div>
    
    <div id="perfect-scan-frame"></div>
    
    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas-match"></canvas>
    </div>

    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('start-btn');
        const scanHint = document.getElementById('scan-hint');
        const scanFrame = document.getElementById('perfect-scan-frame');
        const canvas = document.getElementById('canvas-match');
        const ctx = canvas.getContext('2d');

        let templateImg = new Image();
        let isMatched = false;

        templateImg.src = './card.png'; 

        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            scanHint.style.display = 'block';
            scanFrame.style.display = 'block'; 

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" } }
                });
                video.srcObject = stream;
                
                video.addEventListener('canplay', () => { setTimeout(processVideo, 1000); });
                setTimeout(processVideo, 1000);
            } catch (err) {
                const looseStream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = looseStream;
                setTimeout(processVideo, 1000);
            }
        });

        function processVideo() {
            if (isMatched) return;

            try {
                if (video.readyState === video.HAVE_ENOUGH_DATA && typeof cv !== 'undefined' && cv.Mat) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    let src = cv.imread('canvas-match');
                    let templ = cv.imread(templateImg);
                    let dst = new cv.Mat();
                    let mask = new cv.Mat();

                    cv.matchTemplate(src, templ, dst, cv.TM_CCOEFF_NORMED, mask);
                    let result = cv.minMaxLoc(dst, mask);
                    
                    console.log("當前比對數值：", result.maxVal);

                    // 🎯 將門檻穩定在最靈敏的 0.45 
                    if (result.maxVal > 0.45) {
                        isMatched = true;
                        src.delete(); templ.delete(); dst.delete(); mask.delete();
                        window.location.href = "https://bobo-studio-dodo.github.io/Bobo_studio.dodo_web/";
                        return;
                    }

                    src.delete(); templ.delete(); dst.delete(); mask.delete();
                }
            } catch (e) {
                // 運算中
            }

            if (!isMatched) {
                requestAnimationFrame(processVideo);
            }
        }
    </script>

</body>
</html>
